# Role permissions matrix
permissions:
  SLT:
    see_initiatives:    true
    see_financials:     true
    see_board_report:   true
    create_initiative:  true
    create_task:        true
    assign_task:        true
    edit_any:           true
    delete_own:         true   # only if also a sponsor

  Leader:
    see_initiatives:    false  # HARD wall - never sees SLT initiatives
    see_financials:     false
    see_board_report:   false
    create_initiative:  false
    create_task:        true   # sub-tasks for their own team only
    assign_task:        true
    edit_any:           false  # only their own / their team's tasks
    delete_own:         false

  Member:
    see_initiatives:    false
    see_financials:     false
    see_board_report:   false
    create_initiative:  false
    create_task:        false
    assign_task:        false
    edit_any:           false  # updates status/progress on own tasks only
    delete_own:         false
