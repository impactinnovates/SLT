# ─────────────────────────────────────────────────────────────
#  IEG Strategic Initiatives - Role Configuration
#  Edit this file to manage user access. Matched on the signed-in
#  Microsoft identity (display name or email). No IT ticket needed.
#
#  Roles:
#    SLT     - Senior Leadership: all initiatives + tasks + financials,
#              board report, create/assign, delete (if also a sponsor).
#    Leader  - Plant / Department leader: sees ONLY the tasks they own or
#              assigned to their team. Never sees SLT initiatives or financials.
#              Can create/assign sub-tasks to their people.
#    Member  - Team member: sees ONLY tasks assigned to them; updates
#              status / progress.
# ─────────────────────────────────────────────────────────────

